---
name: "Flux Diff"

on:
  pull_request:
    branches: ["main"]
    paths: ["**.yaml"]

jobs:
  flux-diff:
    name: Flux Diff
    permissions:
      contents: read
      pull-requests: write
      issues: write
    runs-on: ubuntu-latest
    strategy:
      matrix:
        path: ["cluster"]
        resource: ["helmrelease", "kustomization"]
    steps:
      # - name: Generate Token
      #   uses: tibdex/github-app-token@b62528385c34dbc9f38e5f4225ac829252d1ea92 # v1.8.0
      #   id: generate-token
      #   with:
      #     app_id: "${{ secrets.BOT_APP_ID }}"
      #     private_key: "${{ secrets.BOT_APP_PRIVATE_KEY }}"

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@dcc7def046cba2fe8d15d9737a4c250100f62fe0 # v2.9.0
      - uses: allenporter/flux-local/action/diff@92d3a538c009c3fec120fbf50f6ef33b3e0a569c # 8.4.0
        id: diff
        with:
          path: ${{ matrix.path }}
          resource: ${{ matrix.resource }}

      - name: Add comment
        uses: mshick/add-pr-comment@ec328af66588ab8f77cdeb2c264f14aba45bbf59 # v3
        if: ${{ steps.diff.outputs.diff != '' }}
        with:
          # repo-token: ${{ steps.generate-token.outputs.token }}
          message-id: ${{ matrix.path }}/${{ matrix.resource }}
          message-failure: Diff was not successful
          message: |
            ```diff
            ${{ steps.diff.outputs.diff }}
            ```
